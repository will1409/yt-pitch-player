services:
  - type: web
    name: yt-pitch-server
    plan: free
    env: node
    rootDir: server
    buildCommand: YOUTUBE_DL_SKIP_PYTHON_CHECK=1 npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
